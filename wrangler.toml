#:schema node_modules/wrangler/config-schema.json
name = "cafewa"
compatibility_date = "2024-04-03"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static" # Common for Next.js Cloudflare adapter

[[d1_databases]]
binding = "DB" # This is the variable name you use in your code
database_name = "your-d1-database-name" # The name of the DB in your Dashboard
database_id = "your-database-id-goes-here"

# This section fixes your "WORKER_SELF_REFERENCE" error
[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "cafewa"
